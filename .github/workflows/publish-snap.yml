# 1. Register the snap name on the Snap Store using Snapcraft CLI:
# - `snapcraft login`
# - `snapcraft register xleak`
# 2. Export credentials for GitHub Actions:
# - `snapcraft export-login --snaps=xleak --acls=package_upload snapcraft.login`
# 3. Add secret to GitHub repository:
# - Go to Settings → Secrets → Actions
# - Create `SNAPCRAFT_STORE_CREDENTIALS` with contents of `snapcraft.login` file

name: Publish Snap Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.5)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-snap:
    runs-on: ubuntu-22.04
    if: ${{ !github.event.release.prerelease }}

    steps:
      - name: Determine release version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get-version.outputs.tag }}

      - name: Update snap version
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          sed -i "s/^version: .*/version: '$VERSION'/" snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: build

      - name: Publish to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: stable
