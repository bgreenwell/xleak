name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g., v0.2.5)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish-winget:
    runs-on: ubuntu-latest
    if: ${{ !github.event.release.prerelease }}

    steps:
      - name: Determine release version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # The Release workflow triggered by the same tag builds the assets;
      # wait for the one we need instead of racing it (fails after ~30 min).
      - name: Wait for release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.get-version.outputs.tag }}"
          echo "Waiting for xleak-x86_64-pc-windows-msvc.msi on release $TAG..."
          for i in $(seq 1 40); do
            if gh release view "$TAG" --repo ${{ github.repository }} --json assets \
                 --jq '.assets[].name' 2>/dev/null | grep -qx "xleak-x86_64-pc-windows-msvc.msi"; then
              echo "Release asset found."
              exit 0
            fi
            sleep 45
          done
          echo "Timed out waiting for release asset xleak-x86_64-pc-windows-msvc.msi" >&2
          exit 1
      - name: Install Komac
        uses: cargo-bins/cargo-binstall@main

      - name: Install komac binary
        run: cargo binstall komac -y

      - name: Sync WinGet fork
        run: gh repo sync bgreenwell/winget-pkgs
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}

      - name: Publish to WinGet with Komac
        run: |
          komac update bgreenwell.xleak \
            --version ${{ steps.get-version.outputs.version }} \
            --urls "https://github.com/bgreenwell/xleak/releases/download/${{ steps.get-version.outputs.tag }}/xleak-x86_64-pc-windows-msvc.msi" \
            --submit
        env:
          GITHUB_TOKEN: ${{ secrets.WINGET_TOKEN }}
